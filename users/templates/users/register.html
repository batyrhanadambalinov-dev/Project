{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | Deadline Tracker</title>
    <link rel="stylesheet" href="{% static 'users/style.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Регистрация</h2>
            <p class="subtitle">Начните контролировать свою учебу</p>

            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn-primary">Создать аккаунт</button>
            </form>

            <div class="auth-footer">
                <span>Уже есть аккаунт?</span>
                <a href="{% url 'login' %}">Войти в систему</a>
            </div>
        </div>
    </div>
</body>
</html>
